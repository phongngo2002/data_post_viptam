        <button
          onclick="processJSON()"
          class="mt-4 w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-xl font-medium transition">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script>
    
    function formatDate(dateString) {
    const date = new Date(dateString);
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return `${day}/${month}/${year}`;
    }
    function formatDate(dateString) {
        const date = new Date(dateString);
        const day = String(date.getDate()).padStart(2, '0');
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const year = date.getFullYear();
        return `${day}-${month}-${year}`;
    }
    function processJSON() {
        const value = document.querySelector("#data").value;
        const data = JSON.parse(value);


        function totalPacks(walletPacks){
            let totalPack = 0;
            walletPacks.forEach(wallet => {
                totalPack += wallet.amount;
            });

            return totalPack;
        }
        let dataExcel = [];
        const newData = data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)).forEach((item,index) =>  {
            dataExcel.push([formatDate(item.createdAt),
            item.user.fullName ? item.user.fullName : item.user.displayName,
            item.user.pDoneId,
            item.walletPacks.length ? totalPacks(item.walletPacks) : 0,
            item.dOne,
            item.givingDOne
        ])
        })
            const worksheet = XLSX.utils.aoa_to_sheet(dataExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Danh sách");

            // Xuất file Excel
            XLSX.writeFile(workbook, "d-one-mkh-"+formatDate(new Date())+".xlsx");
    }
    


</script>
