<div class="max-w-6xl mx-auto bg-white p-6 rounded-xl shadow">
  <h1 class="text-xl font-bold mb-4">So sánh 2 danh sách mã</h1>

  <div class="grid grid-cols-2 gap-4">
    <textarea id="list1" class="border p-3 h-60 rounded" placeholder="Nhập danh sách 1 (mỗi dòng 1 mã)"></textarea>
    <textarea id="list2" class="border p-3 h-60 rounded" placeholder="Nhập danh sách 2 (mỗi dòng 1 mã)"></textarea>
  </div>

  <button onclick="compare()" 
    class="mt-4 bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">
    So sánh
  </button>

  <div class="grid grid-cols-2 gap-4 mt-6">
    <div>
      <h2 class="font-semibold mb-2">Chỉ có ở danh sách 1</h2>
      <textarea id="only1" class="border p-3 h-60 w-full rounded"></textarea>
    </div>

    <div>
      <h2 class="font-semibold mb-2">Chỉ có ở danh sách 2</h2>
      <textarea id="only2" class="border p-3 h-60 w-full rounded"></textarea>
    </div>
  </div>
</div>
  </div>
<script>
function formatList(text) {
  return text
    .split(/\s+/) // tách theo xuống dòng hoặc khoảng trắng
    .map(x => x.trim())
    .filter(x => x !== "");
}

function compare() {
  const list1 = formatList(document.getElementById("list1").value);
  const list2 = formatList(document.getElementById("list2").value);

  const set1 = new Set(list1);
  const set2 = new Set(list2);

  const only1 = list1.filter(x => !set2.has(x));
  const only2 = list2.filter(x => !set1.has(x));

  document.getElementById("only1").value = only1.join("\n");
  document.getElementById("only2").value = only2.join("\n");
}
</script>
