
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Xuất Dữ Liệu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 ">
  <nav class="bg-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <span class="text-xl font-bold text-blue-600">VDone Tool</span>
        </div>

        <!-- Menu Links -->
        <div class="hidden md:flex space-x-8 items-center">
         <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">Thống kê bài đăng</a>
          <a href="sogao.html" class="text-gray-700 hover:text-blue-600 font-medium">D-one Đơn hàng</a>
          <a href="mkh.html" class="text-gray-700 hover:text-blue-600 font-medium">D-one thẻ MarketHome</a>
          <a href="pdone.html" class="text-gray-700 hover:text-blue-600 font-medium">So sánh mã PDONE</a>
        </div>

        <!-- Mobile menu button -->
        <div class="md:hidden flex items-center">
          <button id="mobile-menu-btn" class="text-gray-600 hover:text-blue-600 focus:outline-none">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </nav>
  <div class="max-w-6xl mx-auto p-6">
    <!-- Title -->
    <h1 class="text-3xl font-bold text-center mb-8 text-gray-800">D-one đơn hàng</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Input JSON -->
      <div class="bg-white rounded-2xl shadow p-5">
        <h2 class="text-xl font-semibold mb-4 text-gray-700">Nhập dữ liệu JSON</h2>
        <textarea
          id="jsonInput"
          class="w-full h-64 p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
          placeholder='Dán JSON vào đây...'>
        </textarea>

        <button
          onclick="processJSON()"
          class="mt-4 w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-xl font-medium transition">
          Xử lý dữ liệu
        </button>
      </div>

      <!-- Output -->
      <div class="bg-white rounded-2xl shadow p-5">
        <h2 class="text-xl font-semibold mb-4 text-gray-700">Kết quả</h2>
   <div class="overflow-auto max-h-64 border rounded-xl">
          <table class="min-w-full text-sm text-left">
            <thead class="bg-gray-200 sticky top-0">
              <tr id="tableHead">
                <th>Ngày mua</th>
                <th>PDONEID</th>
                <th>Tên người mua</th>
                <th>D-one</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="bg-white"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

<script>
    
    function formatDate(dateString) {
    const date = new Date(dateString);
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return `${day}/${month}/${year}`;
    }
    function processJSON() {
    const input = document.getElementById('jsonInput').value;
    const output = document.getElementById('tableBody');
    try {
    const parsed = JSON.parse(input);
        output.innerHTML = parsed.filter(item => item.orderStatus != "WAITING_FOR_PAYMENT" && item.orderStatus != "CANCELED" && item.payment.dOneTotalPrice > 0).map(item => 
                     `
                <tr>
                <td>${formatDate(item.createdAt)}</td>
                <td>${item.customer.pDoneId}</td>
                <td>${item.shipments[0].snapAddress.name}</td>
                <td>${item.payment.dOneTotalPrice}</td>
                </tr>
     
     `).join("");
      } catch (err) {
        output.textContent = 'JSON không hợp lệ!';
      }
    }
    


</script>
</body>

</html>
